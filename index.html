<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EduVision — Human Heart AR</title>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; font-family: sans-serif; }
      #info-card {
        display: none;
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: white;
        border-radius: 16px;
        padding: 16px 24px;
        width: 80%;
        box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        z-index: 999;
        text-align: center;
      }
      #info-card h2 { color: #c0392b; margin: 0 0 8px; font-size: 20px; }
      #info-card p  { color: #333; margin: 0 0 12px; font-size: 14px; }
      #next-btn {
        background: #c0392b;
        color: white;
        border: none;
        padding: 10px 24px;
        border-radius: 20px;
        font-size: 14px;
        cursor: pointer;
      }
      #start-screen {
        position: fixed;
        inset: 0;
        background: #c0392b;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: white;
        z-index: 9999;
        text-align: center;
        padding: 24px;
      }
      #start-screen h1 { font-size: 32px; margin-bottom: 8px; }
      #start-screen p  { font-size: 15px; opacity: 0.85; margin-bottom: 32px; }
      #start-btn {
        background: white;
        color: #c0392b;
        border: none;
        padding: 14px 36px;
        border-radius: 24px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
      }
    </style>
  </head>
  <body>

    <!-- Start Screen -->
    <div id="start-screen">
      <h1>🫀 EduVision</h1>
      <p>Point your camera at the heart marker to see an interactive 3D model with facts!</p>
      <button id="start-btn" onclick="startAR()">Start AR Experience</button>
    </div>

    <!-- Info Card (shows when heart is detected) -->
    <div id="info-card">
      <h2 id="fact-title">Human Heart</h2>
      <p id="fact-text">The heart beats 100,000 times every day!</p>
      <button id="next-btn" onclick="nextFact()">Next Fact ➜</button>
    </div>

    <!-- AR Scene -->
    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;"
      color-space="sRGB"
      renderer="colorManagement: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      id="ar-scene"
      style="display:none">

      <a-assets>
        <a-asset-item id="heart-obj" src="https://cdn.jsdelivr.net/gh/nicktrienensfuzz/pano@master/assets/heart.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <!-- Red spinning sphere as heart placeholder -->
        <a-sphere
          position="0 0 0"
          radius="0.3"
          color="#c0392b"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear">
        </a-sphere>
        <!-- Pulse animation ring -->
        <a-torus
          position="0 0 0"
          radius="0.35"
          radius-tubular="0.01"
          color="#e74c3c"
          animation="property: scale; from: 1 1 1; to: 1.3 1.3 1.3; loop: true; dur: 800; direction: alternate; easing: easeInOutSine">
        </a-torus>
        <!-- Label above heart -->
        <a-text
          value="HUMAN HEART"
          position="0 0.5 0"
          align="center"
          color="#ffffff"
          width="2"
          font="exo2bold">
        </a-text>
      </a-entity>
    </a-scene>

    <script>
      const facts = [
        { title: "Human Heart", text: "The heart beats about 100,000 times every single day!" },
        { title: "4 Chambers",  text: "The heart has 4 chambers: left & right atrium, left & right ventricle." },
        { title: "Blood Pump",  text: "It pumps 5 litres of blood around your body every minute." },
        { title: "Heart Size",  text: "Your heart is roughly the size of your fist and weighs 300 grams." },
        { title: "Beat Rate",   text: "A healthy heart beats 60–100 times per minute at rest." },
      ];
      let factIndex = 0;

      function nextFact() {
        factIndex = (factIndex + 1) % facts.length;
        document.getElementById('fact-title').textContent = facts[factIndex].title;
        document.getElementById('fact-text').textContent  = facts[factIndex].text;
      }

      function startAR() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('ar-scene').style.display = 'block';
        const sceneEl = document.querySelector('a-scene');
        sceneEl.addEventListener('loaded', () => {
          const arSystem = sceneEl.systems['mindar-image-system'];
          arSystem.start();
        });
      }

      // Show info card when heart marker is detected
      document.addEventListener('DOMContentLoaded', () => {
        const target = document.querySelector('[mindar-image-target]');
        if (target) {
          target.addEventListener('targetFound', () => {
            document.getElementById('info-card').style.display = 'block';
          });
          target.addEventListener('targetLost', () => {
            document.getElementById('info-card').style.display = 'none';
          });
        }
      });
    </script>
  </body>
</html>
